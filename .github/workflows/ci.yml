name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — Lint, Type-check & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mediclick
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: mediclick
        ports:
          - 5436:5432
        options: >-
          --health-cmd="pg_isready -U mediclick"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://mediclick:testpass@localhost:5436/mediclick?schema=public
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: pnpm test -- --passWithNoTests

  client:
    name: Client — Lint & Type-check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    env:
      NEXT_PUBLIC_API_URL: http://localhost:5100

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: pnpm run build
